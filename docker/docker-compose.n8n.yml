# ============================================
# Onespace AI - n8n Local Development Setup
# ============================================
# Usage:
#   docker compose -f docker/docker-compose.n8n.yml up -d
#   
# Access n8n at: http://localhost:5678
# ============================================

version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: onespace-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Basic configuration
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=onespace-n8n-dev
      
      # Webhook configuration
      - WEBHOOK_URL=http://localhost:5678
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      
      # Timezone
      - GENERIC_TIMEZONE=Asia/Kolkata
      - TZ=Asia/Kolkata
      
      # External hooks (for Onespace AI integration)
      - N8N_METRICS=true
      
      # Execution settings
      - EXECUTIONS_MODE=regular
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - onespace-network

volumes:
  n8n_data:
    driver: local

networks:
  onespace-network:
    driver: bridge
